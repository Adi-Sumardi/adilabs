name: Generate Scheduled Articles

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6:00 AM UTC
    - cron: '0 6 * * 3'  # Wednesday 6:00 AM UTC
    - cron: '0 6 * * 5'  # Friday 6:00 AM UTC
  workflow_dispatch: {}   # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger article generation
        run: |
          curl -s -f -X GET https://adilabs.id/api/blog/generate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -o response.json
          cat response.json

      - name: Check result
        run: |
          if grep -q '"success":true' response.json; then
            echo "Article generated successfully"
          else
            echo "Article generation failed or no articles scheduled today"
            cat response.json
          fi
