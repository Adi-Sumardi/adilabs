name: Generate Scheduled Articles

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6:00 AM UTC
    - cron: '0 6 * * 3'  # Wednesday 6:00 AM UTC
    - cron: '0 6 * * 5'  # Friday 6:00 AM UTC
  workflow_dispatch: {}   # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger article generation
        run: |
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X GET https://adilabs.id/api/blog/generate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat response.json
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Request failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Check result
        run: |
          if grep -q '"success":true' response.json; then
            echo "Article generated successfully"
          else
            echo "No articles scheduled today or generation skipped"
            cat response.json
          fi
